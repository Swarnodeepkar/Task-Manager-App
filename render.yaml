services:
  # Backend API - Web Service
  - type: web
    name: task-manager-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/auth/login
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        value: mongodb+srv://swarnodeepk:SYPdm085w9bMeM5e@wellzio-stag.wvh8tzv.mongodb.net/taskmanager
      - key: JWT_SECRET
        value: your_super_secret_jwt_key_change_this
      - key: JWT_EXPIRES_IN
        value: 7d

  # Frontend - Static Site
  - type: static
    name: task-manager-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://task-manager-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
