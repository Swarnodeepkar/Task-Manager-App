services:
  # Backend API - Web Service
  - type: web
    name: task-manager-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb+srv://swarnodeepk:SYPdm085w9bMeM5e@wellzio-stag.wvh8tzv.mongodb.net/taskmanager
      - key: JWT_SECRET
        value: your_super_secret_jwt_key_change_this
      - key: JWT_EXPIRES_IN
        value: 7d

  # Frontend - Static Site
  - type: web
    name: task-manager-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 3000
    envVars:
      - key: VITE_API_BASE_URL
        value: https://task-manager-backend-dksg.onrender.com/api
